<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Termin buchen</title>
    <!--<link rel="stylesheet" href="index.css">  -->
    <link rel="stylesheet" href="index.css?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/css/intlTelInput.css">
</head>

<body>

<div class="topBar">
    <button id="adminLoginBtn">Admin Login</button>
</div>

<div class="wrapper">
    <div class="content">
        <h1>Terminbuchung</h1>

        <p>Anliegen auswählen:</p>
        <select id="anliegen" onchange="zeigeSonstigesFeld()">
            <option value="">Bitte auswählen</option>
            <option value="Einlagen">Einlagen</option>
            <option value="Kompression">Kompressionstrümpfe</option>
            <option value="Orthesen">Orthesen</option>
            <option value="EDS">EDS Beratung</option>
            <option value="Prothesen">Prothesen</option>
            <option value="Sonstiges">Sonstiges</option>
        </select>

        <textarea id="sonstigesText" style="display:none;" placeholder="Bitte Anliegen beschreiben"></textarea>

        <p>Datum auswählen:</p>
        <input type="date" id="datum">

        <button onclick="ladeTermine()">Freie Termine anzeigen</button>

        <h2>Freie Termine:</h2>
        <ul id="slots"></ul>
    </div>

    <div id="overlay"></div>

    <div id="buchungForm">
        <div id="auswahlInfo"></div>

        <input type="text" id="vorname" placeholder="Vorname"><br>
        <input type="text" id="nachname" placeholder="Nachname"><br>
        <input type="tel" id="telefon"><br>

        <label>
            <input type="checkbox" id="verordnung">
            Ich habe eine Verordnung
        </label>

        <div id="uploadBox" style="display:none;">
            <input type="file" id="verordnungDatei" accept="image/*,.pdf">
        </div>

        <button onclick="terminAbsenden()">Termin bestätigen</button>
    </div>

    <footer class="footer">
        <img src="Logo.png" alt="Logo">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>

    </footer>

    <div id="loginPanel" class="hidden">

        <h2>Admin Login</h2>

        <input
                type="text"
                id="username"
                placeholder="Benutzername">

        <input
                type="password"
                id="password"
                placeholder="Passwort">

        <button id="loginBtn">
            Anmelden
        </button>

    </div>

    <div id="adminPanel" class="hidden adminPanel">

        <div class="adminHeader">
            <h2>Admin Bereich</h2>
            <button onclick="closeAdmin()">Schließen</button>
        </div>

        <table class="adminTable">
            <thead>
            <tr>
                <th>Name</th>
                <th>Datum</th>
                <th>Uhrzeit</th>
                <th>Verordnung</th>
                <th>Datei</th>
            </tr>
            </thead>

            <tbody id="adminContent"></tbody>
        </table>

    </div>

</div>

<!-- intl-tel-input -->
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/intlTelInput.min.js"></script>

<script>
    const input = document.querySelector("#telefon");

    const iti = window.intlTelInput(input, {
        initialCountry: "de",
        separateDialCode: true,
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"
    });
</script>

<script>
    const API_URL = "https://kalender-3lt5.onrender.com";

    let gewaehltesDatum = "";
    let gewaehlteUhrzeit = "";

    /* -----------------------
       TERMINE LADEN
    ----------------------- */
    function ladeTermine() {

        const datum = document.getElementById("datum").value;
        const anliegen = document.getElementById("anliegen").value;

        if (!datum || !anliegen) {
            alert("Bitte zuerst Anliegen und Datum auswählen.");
            return;
        }

        fetch(`${API_URL}/kalender/freietermine?datum=${datum}`)
            .then(res => res.json())
            .then(data => {

                const list = document.getElementById("slots");
                list.innerHTML = "";

                data.forEach(slot => {
                    const li = document.createElement("li");
                    li.innerText = slot;
                    li.onclick = () => buchen(datum, slot);
                    list.appendChild(li);
                });
            });
    }

    /* -----------------------
       BUCHEN
    ----------------------- */
    function buchen(datum, uhrzeit) {
        gewaehltesDatum = datum;
        gewaehlteUhrzeit = uhrzeit;

        document.getElementById("auswahlInfo").innerText =
            "Termin: " + datum + " um " + uhrzeit;

        document.getElementById("buchungForm").classList.add("aktiv");
        document.getElementById("overlay").classList.add("aktiv");
    }

    /* -----------------------
       SONSTIGES FELD
    ----------------------- */
    function zeigeSonstigesFeld() {
        const auswahl = document.getElementById("anliegen").value;

        document.getElementById("sonstigesText").style.display =
            (auswahl === "Sonstiges") ? "block" : "none";
    }

    /* -----------------------
       TERMIN ABSENDEN
    ----------------------- */
    function terminAbsenden() {

        const vorname = document.getElementById("vorname").value;
        const nachname = document.getElementById("nachname").value;
        const anliegen = document.getElementById("anliegen").value;
        const sonstiges = document.getElementById("sonstigesText").value;

        if (!vorname || !nachname || !anliegen) {
            alert("Bitte alle Felder ausfüllen!");
            return;
        }

        if (!iti.isValidNumber()) {
            alert("Bitte gültige Telefonnummer eingeben!");
            return;
        }

        const telefon = iti.getNumber();

        const formData = new FormData();

        formData.append("datum", gewaehltesDatum);
        formData.append("uhrzeit", gewaehlteUhrzeit);
        formData.append("vorname", vorname);
        formData.append("nachname", nachname);
        formData.append("telefon", telefon);
        formData.append("anliegen", anliegen);
        formData.append("beschreibung", sonstiges);

        const file = document.getElementById("verordnungDatei").files[0];
        if (file) {
            formData.append("verordnung", file);
        }

        fetch(`${API_URL}/kalender/buchen`, {
            method: "POST",
            body: formData
        })
            .then(res => res.text())
            .then(msg => {
                alert(msg);
                ladeTermine();

                document.getElementById("buchungForm").classList.remove("aktiv");
                document.getElementById("overlay").classList.remove("aktiv");
            });
    }

    /* -----------------------
       OVERLAY
    ----------------------- */
    document.getElementById("overlay").onclick = () => {
        document.getElementById("buchungForm").classList.remove("aktiv");
        document.getElementById("overlay").classList.remove("aktiv");
    };

    document.getElementById("verordnung").addEventListener("change", function () {
        document.getElementById("uploadBox").style.display =
            this.checked ? "block" : "none";
    });

    /* -----------------------
       ADMIN LOGIN
    ----------------------- */
    window.addEventListener("load", () => {

        const panel = document.getElementById("adminPanel");

        document.getElementById("adminLoginBtn").onclick = () => {
            document.getElementById("loginPanel").classList.remove("hidden");
        };

        document.getElementById("loginBtn").onclick = () => {

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;


            console.log(username);
            console.log(password);

            const formData = new URLSearchParams();

            formData.append("username", username);
            formData.append("password", password);

            fetch(`${API_URL}/login`, {
                method: "POST",
                body: formData,
                credentials: "include"
            })
                .then(res => {
                    if (res.ok) {
                        alert("Login erfolgreich!");

                        document.getElementById("loginPanel").classList.add("hidden");
                        document.getElementById("adminPanel").classList.remove("hidden");

                        ladeAdminDaten();
                    } else {
                        alert("Login fehlgeschlagen!");
                    }
                });

        };



    });

    /* -----------------------
       ADMIN DATEN LADEN
    ----------------------- */
    function ladeAdminDaten() {

        fetch(`${API_URL}/admin/termine`)
            .then(res => res.json())
            .then(data => {

                const tbody = document.getElementById("adminContent");
                tbody.innerHTML = "";

                data.forEach(t => {

                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                    <td>${t.vorname} ${t.nachname}</td>
                    <td>${t.datum}</td>
                    <td>${t.uhrzeit}</td>
                    <td>${t.verordnung ? "JA" : "NEIN"}</td>
                    <td></td>
                `;

                    if (t.verordnung && t.dateiname) {

                        const btn = document.createElement("button");
                        btn.innerText = "Öffnen";

                        btn.onclick = () => {
                            window.open(
                                `${API_URL}/admin/verordnung/${t.dateiname}`,
                                "_blank"
                            );
                        };

                        tr.children[4].appendChild(btn);

                    } else {
                        tr.children[4].innerText = "-";
                    }

                    tbody.appendChild(tr);
                });
            });
    }

    function closeAdmin() {
        document.getElementById("adminPanel").classList.add("hidden") ;
    }
</script>

</body>
</html>
