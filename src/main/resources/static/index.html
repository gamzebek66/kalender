<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Termin buchen</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/css/intlTelInput.css">
</head>

<body>
<div class="wrapper">
    <div class="content">
        <h1>Terminbuchung</h1>

        <p>Anliegen auswählen:</p>
        <select id="anliegen" onchange="zeigeSonstigesFeld()">
            <option value="">Bitte auswählen</option>
            <option value="Einlagen">Einlagen</option>
            <option value="Kompression">Kompressionstrümpfe</option>
            <option value="Orthesen">Orthesen</option>
            <option value="EDS">EDS Beratung</option>
            <option value="Rezept">Fragen zum Rezept</option>
            <option value="Prothesen">Prothesen</option>
            <option value="Sonstiges">Sonstiges</option>
        </select>

        <textarea id="sonstigesText" placeholder="Bitte Anliegen beschreiben" style="display:none;"></textarea>

        <p>Datum auswählen:</p>
        <input type="date" id="datum">

        <button onclick="ladeTermine()">Freie Termine anzeigen</button>

        <h2>Freie Termine:</h2>
        <ul id="slots"></ul>
    </div>

    <div id="overlay"></div>

    <div id="buchungForm">
        <div id="auswahlInfo"></div>
        <input type="text" id="vorname" placeholder="Vorname"><br>
        <input type="text" id="nachname" placeholder="Nachname"><br>

        <label>Telefonnummer</label><br>
        <input type="tel" id="telefon"><br>

        <button onclick="terminAbsenden()">Termin bestätigen</button>
    </div>

    <footer class="footer">
        <img src="Logo.png" alt="Logo">
    </footer>
</div>

<!-- intl-tel-input -->
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/intlTelInput.min.js"></script>

<script>
    const input = document.querySelector("#telefon");

    const iti = window.intlTelInput(input, {
        initialCountry: "de",
        separateDialCode: true,
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"
    });
</script>

<script>
    const API_URL = "https://kalender-3lt5.onrender.com";
    let gewaehltesDatum = "";
    let gewaehlteUhrzeit = "";

    const Feiertage = [
        "2026-05-01",
        "2026-05-14",
        "2026-05-25",
        "2026-08-03",
        "2026-12-24",
        "2026-12-25",
        "2026-12-26",
        "2026-12-27",
        "2026-12-28",
        "2026-12-29",
        "2026-12-30",
        "2026-12-31",
        "2027-01-01"
    ];

    function ladeTermine() {
        const datum = document.getElementById("datum").value;
        const anliegen = document.getElementById("anliegen").value;

        if (!datum || !anliegen) {
            alert("Bitte zuerst Anliegen und Datum auswählen");
            return;
        }

        if (Feiertage.includes(datum)) {
            alert("Es tut uns leid, aber an diesem Tag ist die SaniTheke aufgrund von Feiertagen geschlossen");
            return;
        }

        fetch(`${API_URL}/kalender/freietermine?datum=${datum}`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("slots");
                list.innerHTML = "";

                let gefiltert = data;
                const tag = new Date(datum).getDay(); // 0=So ... 6=Sa

                if (anliegen === "Einlagen") {
                    gefiltert = data.filter(zeit => {
                        const [h, m] = zeit.split(":").map(Number);
                        return h >= 9 && h < 17 && (m === 0 || m === 30);
                    });
                }

                if (anliegen === "Kompression") {
                    gefiltert = data.filter(zeit => {
                        const [h, m] = zeit.split(":").map(Number);
                        return h >= 9 && h < 14 && m === 0;
                    });
                }

                if (anliegen === "Orthesen") {
                    gefiltert = data.filter(zeit => {
                        const [h, m] = zeit.split(":").map(Number);
                        return h >= 10 && h < 17 && m === 0;
                    });
                }

                if (anliegen === "EDS") {
                    gefiltert = data.filter(zeit => {
                        const [h, m] = zeit.split(":").map(Number);
                        return h >= 10 && h < 14 && m === 0;
                    });
                }

                if (anliegen === "Prothesen") {
                    if (tag === 3 || tag === 4) {
                        gefiltert = data.filter(zeit => {
                            const [h, m] = zeit.split(":").map(Number);
                            return h >= 14 && h < 18 && m === 0;
                        });
                    } else {
                        gefiltert = [];
                    }
                }

                if (anliegen === "Sonstiges") {
                    gefiltert = data.filter(zeit => {
                        const [h, m] = zeit.split(":").map(Number);
                        return h >= 10 && h < 14 && m === 0;
                    });
                }

                if (gefiltert.length === 0) {
                    list.innerHTML = "<li>Keine passenden Termine</li>";
                    return;
                }

                gefiltert.forEach(slot => {
                    const li = document.createElement("li");
                    li.innerText = slot;
                    li.onclick = () => buchen(datum, slot);
                    list.appendChild(li);
                });
            });
    }

    function buchen(datum, uhrzeit){
        gewaehltesDatum = datum;
        gewaehlteUhrzeit = uhrzeit;

        document.getElementById("auswahlInfo").innerText =
            "Termin: " + datum + " um " + uhrzeit;

        document.getElementById("buchungForm").classList.add("aktiv");
        document.getElementById("overlay").classList.add("aktiv");
    }

    function zeigeSonstigesFeld(){
        const auswahl = document.getElementById("anliegen").value;
        document.getElementById("sonstigesText").style.display =
            (auswahl === "Sonstiges") ? "block" : "none";
    }

    function terminAbsenden(){
        const vorname = document.getElementById("vorname").value;
        const nachname = document.getElementById("nachname").value;
        const anliegen = document.getElementById("anliegen").value;
        const sonstiges = document.getElementById("sonstigesText").value;

        if(!vorname || !nachname || !anliegen){
            alert("Bitte alle Felder ausfüllen!");
            return;
        }

        if (!iti.isValidNumber()) {
            alert("Bitte gültige Telefonnummer eingeben!");
            return;
        }

        const telefon = iti.getNumber();

        fetch(`${API_URL}/kalender/buchen`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                datum:gewaehltesDatum,
                uhrzeit:gewaehlteUhrzeit,
                vorname,
                nachname,
                telefon,
                anliegen,
                beschreibung:sonstiges
            })
        })
            .then(res=>res.text())
            .then(msg=>{
                alert(msg);
                ladeTermine();

                document.getElementById("buchungForm").classList.remove("aktiv");
                document.getElementById("overlay").classList.remove("aktiv");
            });
    }

    document.getElementById("overlay").onclick=()=>{
        document.getElementById("buchungForm").classList.remove("aktiv");
        document.getElementById("overlay").classList.remove("aktiv");
    };
</script>

</body>
</html>
